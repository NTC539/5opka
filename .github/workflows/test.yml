name: Tests

on:
  push:
    branches: [ question-form ]

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./5opkaWebsite
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv bottle

      - name: Run tests
        working-directory: ./5opkaWebsite
        run: |
          python -m unittest simple_test.py -v